<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Asistencia Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; padding: 30px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a3a5a; margin-bottom: 20px; }
        .item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; margin-right: 15px; }
        .btn-container { margin-top: 25px; display: grid; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-pdf { background: #e74c3c; color: white; }
        .btn-pdf:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="card">
    <h2>Control Campus ⚽</h2>
    <div id="lista"></div>
    <div class="btn-container">
        <button class="btn-pdf" onclick="descargarPDF()">Generar Reporte PDF</button>
    </div>
</div>

<script>
    const alumnos = ["A. Ezequiel Martín Pérez", "Antoine Rodríguez", "Arai Falcón Roque", "Bruno Panadero Sánchez", "David Navarro Rodríguez", "Eric Kentzer Tkaczyk", "Héctor Muñoz Cabrera", "Hugo Flores Pérez", "Ian Sanz Diago", "Jahaziel Perera Padilla", "Joel Betancor García", "Jorge García Díaz", "José López Ortega", "Julen Rodriguez Martin", "Kevin Fuentes", "Leo Muñoz Cabrera", "Leo Sanz Diago", "Mateo Panadero Sánchez", "Matteo Luchoro Hernández", "Nahuel Salgado", "Nicolás Marrero Deniz", "Pablo García Medina", "Rodrigo Anguita Argudo", "Tymon Kentzer"];

    const listDiv = document.getElementById('lista');
    alumnos.forEach(nom => {
        listDiv.innerHTML += `<div class="item"><input type="checkbox" id="${nom}"><label>${nom}</label></div>`;
    });

    async function descargarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 20;

        doc.setFontSize(16);
        doc.text("Reporte de Asistencia - Campus", 20, y);
        y += 10;
        doc.setFontSize(10);
        doc.text("Fecha: " + new Date().toLocaleDateString(), 20, y);
        y += 15;

        alumnos.forEach(nom => {
            const check = document.getElementById(nom).checked ? "[X]" : "[  ]";
            doc.text(`${check} ${nom}`, 20, y);
            y += 8;
            if (y > 280) { doc.addPage(); y = 20; }
        });

        doc.save(`Asistencia_${new Date().toISOString().slice(0,10)}.pdf`);
    }
</script>
</body>
</html>
