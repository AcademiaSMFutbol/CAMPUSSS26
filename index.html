<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Asistencia Pro - Selección de Fecha</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; padding: 30px; }
        .card { max-width: 550px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a3a5a; margin-bottom: 10px; }
        .date-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #ddd; }
        label { font-weight: bold; margin-right: 10px; color: #444; }
        input[type="date"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; }
        .item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .item:hover { background: #fcfcfc; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin-right: 15px; }
        .btn-container { margin-top: 25px; display: grid; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-pdf { background: #e74c3c; color: white; font-size: 16px; }
        .btn-pdf:hover { background: #c0392b; scale: 1.02; }
    </style>
</head>
<body>

<div class="card">
    <h2>Control de Campus ⚽</h2>
    
    <div class="date-section">
        <label for="fechaAsistencia">Fecha de la lista:</label>
        <input type="date" id="fechaAsistencia">
    </div>

    <div id="lista"></div>

    <div class="btn-container">
        <button class="btn-pdf" onclick="descargarPDF()">Descargar PDF con Fecha Seleccionada</button>
    </div>
</div>

<script>
    // Establecer fecha de hoy por defecto al cargar
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fechaAsistencia').value = hoy;

    const alumnos = ["A. Ezequiel Martín Pérez", "Antoine Rodríguez", "Arai Falcón Roque", "Bruno Panadero Sánchez", "David Navarro Rodríguez", "Eric Kentzer Tkaczyk", "Héctor Muñoz Cabrera", "Hugo Flores Pérez", "Ian Sanz Diago", "Jahaziel Perera Padilla", "Joel Betancor García", "Jorge García Díaz", "José López Ortega", "Julen Rodriguez Martin", "Kevin Fuentes", "Leo Muñoz Cabrera", "Leo Sanz Diago", "Mateo Panadero Sánchez", "Matteo Luchoro Hernández", "Nahuel Salgado", "Nicolás Marrero Deniz", "Pablo García Medina", "Rodrigo Anguita Argudo", "Tymon Kentzer"];

    const listDiv = document.getElementById('lista');
    alumnos.forEach(nom => {
        listDiv.innerHTML += `
            <div class="item">
                <input type="checkbox" id="${nom}">
                <label for="${nom}">${nom}</label>
            </div>`;
    });

    async function descargarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const fechaSeleccionada = document.getElementById('fechaAsistencia').value;
        
        // Formatear fecha para el encabezado (dd/mm/aaaa)
        const fechaFormateada = fechaSeleccionada.split('-').reverse().join('/');
        
        let y = 20;
        doc.setFontSize(18);
        doc.setTextColor(26, 58, 90);
        doc.text("REPORTE DE ASISTENCIA", 105, y, { align: "center" });
        
        y += 12;
        doc.setFontSize(12);
        doc.setTextColor(100);
        doc.text(`Fecha del Control: ${fechaFormateada}`, 105, y, { align: "center" });
        
        y += 15;
        doc.setFontSize(11);
        doc.setTextColor(0);
        
        alumnos.forEach((nom, index) => {
            const check = document.getElementById(nom).checked ? "[X] PRESENTE" : "[  ] AUSENTE";
            
            // Alternar color de fondo suave para lectura
            if (index % 2 === 0) {
                doc.setFillColor(245, 245, 245);
                doc.rect(15, y - 5, 180, 8, 'F');
            }
            
            doc.text(check, 20, y);
            doc.text(nom, 55, y);
            
            y += 8;
            if (y > 275) { 
                doc.addPage(); 
                y = 20; 
            }
        });

        doc.save(`Asistencia_Campus_${fechaSeleccionada}.pdf`);
    }
</script>
</body>
</html>
